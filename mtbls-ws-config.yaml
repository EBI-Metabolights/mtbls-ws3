services:
  authentication:
    mtbls_ws2:
      host: hh-rke-wp-webadmin-33-worker-3.caas.ebi.ac.uk
      port: 7007
      base_context_path: /metabolights/ws
      scheme: http
    standalone:
      application_secret_key: "{{ authentication.standalone.application_secret_key }}"
    keycloak:
      host: "http://keycloak.keycloak.svc.cluster.local:8080/metabolights/test/iam/"
      realm_name: "metabolights"
      client_id: "mtblsws-py-test"
      client_secret: "{{ authentication.keycloak.client_secret }}"
    active_authentication_service: mtbls_ws2
  policy_service:
    opa:
      validate_schema: false
      timeout_in_seconds: 600
      version_url: http://policy-engine:8181/v1/data/metabolights/validation/v2/configuration/version
      validation_url: http://policy-engine:8181/v1/data/metabolights/validation/v2/report/complete_report?pretty=true
      templates_url: http://policy-engine:8181/v1/data/metabolights/validation/v2/templates
      control_lists_url: http://policy-engine:8181/v1/data/metabolights/validation/v2/controls
      rule_definitions_url: http://policy-engine:8181/v1/data/metabolights/validation/v2/configuration/rules
  system_health_check:
      remote:
        transfer_health_check:
          health_check_url: "http://45.88.81.49:8081/health"
          timeout_in_seconds: 5
repositories:
  study_folders:
    mounted_paths:
      private_metadata_files_root_path: "/nfs/public/rw/metabolomics/prod/data/studies/metadata-files"
      deleted_private_metadata_files_root_path: "/nfs/public/rw/metabolomics/prod/data/studies/deleted-files"
      audit_files_root_path: "/nfs/public/rw/metabolomics/prod/data/studies/audit-files"
      internal_files_root_path: "/nfs/public/rw/metabolomics/prod/data/studies/internal-files"
      private_data_files_root_path: ""
      report_files_root_path: ""
      public_studies_root_path: ""
      deleted_public_studies_root_path: ""
      indices_cache_root_path: "/nfs/public/rw/metabolomics/prod/data/studies/cache/indices-data"
run:
  submission:
    default_dataset_license:
      name: "CC0 1.0 Universal"
      version: "1.0"
    module_config:
      loaded_sub_package_names:
      - mtbls.presentation.rest_api.core
      - mtbls.presentation.rest_api.groups.auth.v1
      - mtbls.presentation.rest_api.groups.public.v1
      - mtbls.presentation.rest_api.groups.submission.v1.routers.validation_tasks
      - mtbls.presentation.rest_api.groups.submission.v1.routers.dataset_license
      - mtbls.presentation.rest_api.groups.curation.v1
      - mtbls.presentation.rest_api.groups.system.v1
      - mtbls.presentation.utils
    authorized_endpoints:
    - prefix: "/submissions/"
      scopes:
      - curator
      - submitter
    - prefix: "/curation/"
      scopes:
      - curator
      - submitter
    api_server_config:
      port: 7077
      api_groups:
      - config_name: "public"
        enabled: true
        router_paths:
        - mtbls/presentation/rest_api/groups/public/v1
      - config_name: "submission"
        enabled: true
        router_paths:
        - mtbls/presentation/rest_api/groups/submission/v1/routers/validation_tasks
        - mtbls/presentation/rest_api/groups/submission/v1/routers/dataset_license
      - config_name: "curation"
        enabled: true
        router_paths:
        - mtbls/presentation/rest_api/groups/curation/v1
      - config_name: "auth"
        enabled: true
        router_paths:
        - mtbls/presentation/rest_api/groups/auth/v1
      - config_name: "system"
        enabled: true
        router_paths:
        - mtbls/presentation/rest_api/groups/system/v1
      cors:
        origins:
        - http(s*)://.*\.ebi\.ac\.uk(:\d{1,5})?
        - http(s*)://localhost(:\d{1,5})?
        - http(s*)://127\.0\.0\.1(:\d{1,5})?
      server_info:
        root_path: ""
        title: "EMBL-EBI MetaboLights Submission API"
        description: EMBL European Bioinformatics Institute (EBI) - MetaboLights Submission OpenAPI Schema
        summary: Open MetaboLights Submission REST API
        terms_of_service: https://www.ebi.ac.uk/about/terms-of-use
        license_info:
          name: Apache 2.0
          identifier: Apache 2.0
        contact:
          name: MetaboLights
          url: https://www.ebi.ac.uk/metabolights
          email: metabolights-help@ebi.ac.uk
        openapi_tags:
        - name: "About API"
          description: "Get information about API"
        - name: "MetaboLights Submission"
          description: "Study submission and validation"
        - name: "MetaboLights Curation"
          description: "Study curation endpoints (curators only)"
        - name: "Public"
          description: "Public MetaboLights studies and statistics"
        - name: "Auth"
          description: "Identity & Authentication & Authorization"
        - name: "System"
          description: "System configuration and status"
    logging:
      version: 1
      disable_existing_loggers: true
      formatters:
        json_formatter:
          format: '{ "level_name": "%(levelname)s", "time": "%(asctime)s",  "client": "%(client)s",  "path": "%(route_path)s", "resource_id": "%(resource_id)s", "user": %(user_id)d, "request_id": "%(request_id)s", "name": "%(name)s", "message": "%(message)s" }'
        text_formatter:
          format: '%(levelname)-8s %(asctime)s %(user_id)d %(client)s %(route_path)s %(resource_id)s %(request_id)s %(name)s "%(message)s"'
      handlers:
        console:
          class: "logging.StreamHandler"
          level: DEBUG
          formatter: "text_formatter"
          stream: "ext://sys.stdout"
          filters: [ default_filter, correlation_id ]
      root:
        level: DEBUG
        handlers: [ "console" ]
        propogate: true
      loggers:
        mtbls:
          level: DEBUG
          propogate: yes
        uvicorn:
          level: INFO
          propogate: yes
        celery:
          level: INFO
          propogate: yes
        httpcore:
          level: WARNING
          propogate: yes
      filters:
        correlation_id:
          (): "asgi_correlation_id.CorrelationIdFilter"
          default_value: "-"
        default_filter:
          (): "mtbls.run.rest_api.submission.log_filter.DefaultLogFilter"
  common_worker:
    module_config:
      loaded_sub_package_names: []
    logging:
      version: 1
      disable_existing_loggers: true
      formatters:
        json_formatter:
          format: '{ "level_name": "%(levelname)s", "time": "%(asctime)s", "route_path": "%(route_path)s", "resource_id": "%(request_id)s ", "user_id": %(user_id)d, "request_id": "%(request_id)s", "task_id": "%(task_id)s", "thread_name": "%(threadName)s",  "name": "%(name)s", "message": "%(message)s" }'
        text_formatter:
          format: '%(levelname)-8s %(asctime)s %(user_id)d %(client)s %(route_path)s %(resource_id)s %(request_id)s %(task_id)s %(threadName)s, %(name)s "%(message)s"'
      handlers:
        console:
          class: "logging.StreamHandler"
          level: DEBUG
          formatter: "text_formatter"
          stream: "ext://sys.stdout"
          filters: [ default_filter ]
      root:
        level: DEBUG
        handlers: [ "console" ]
        propogate: true
      loggers:
        mtbls:
          level: DEBUG
          propogate: yes
        uvicorn:
          level: DEBUG
          propogate: yes
        celery:
          level: INFO
          propogate: yes
        httpcore:
          level: WARNING
          propogate: yes
      filters:
        default_filter:
          (): "mtbls.run.worker.common.log_filter.DefaultLogFilter"
  monitor:
    port: 5555