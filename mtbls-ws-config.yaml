  database:
    sqlite:
      connection:
        file_path: .test-temp/sqlite_test.db
        url_scheme: sqlite+aiosqlite
    postgresql:
      connection:
        host: pgsql-hlvm-106.ebi.ac.uk
        port: 5432
        user: wpk8smtblsrw
        password: "{{ postgresql.password }}"
        database: mmimetablpro
        url_scheme: postgresql+asyncpg
    mongodb:
      connection:
        url_scheme: mongodb
        hosts: 
          - mongodb-hlvm-319.ebi.ac.uk:27017
          - mongodb-hxvm-344.ebi.ac.uk:27017
        port: -1
        user: metabolightsdev_reader
